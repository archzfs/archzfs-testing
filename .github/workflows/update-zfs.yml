name: Update OpenZFS Conf

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New OpenZFS version'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Download release and calculate hash
        id: calc_hash
        run: |
          VERSION="${{ inputs.version }}"
          TARBALL_URL="https://github.com/openzfs/zfs/releases/download/zfs-${VERSION}/zfs-${VERSION}.tar.gz"
          
          echo "Downloading $TARBALL_URL..."
          curl -sL "$TARBALL_URL" -o zfs.tar.gz
          
          HASH=$(sha256sum zfs.tar.gz | awk '{print $1}')
          echo "New hash: $HASH"
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Update conf.sh
        run: |
          VERSION="${{ inputs.version }}"
          HASH="${{ steps.calc_hash.outputs.hash }}"
          
          # Replace version and hash in conf.sh
          sed -i "s/^openzfs_version=\".*\"/openzfs_version=\"${VERSION}\"/" conf.sh
          sed -i "s/^zfs_src_hash=\".*\"/zfs_src_hash=\"${HASH}\"/" conf.sh

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          token: ${{ github.token }}
          commit-message: "chore: update OpenZFS to ${{ inputs.version }}"
          title: "Update OpenZFS to ${{ inputs.version }}"
          body: |
            Automated PR triggered by nvchecker. Updates `openzfs_version` to **${{ inputs.version }}** and computes the new `zfs_src_hash`.
          branch: "update-openzfs-${{ inputs.version }}"
          base: master

