name: Watch for Arch Kernel Updates

on:
  schedule:
    - cron: '*/30 * * * *'  # Runs every 30 minutes
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get install -y jq curl

      - name: Check For Unreleased Linux Kernel
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Get Upstream Arch Linux Kernel Version
          ARCH_JSON=$(curl -s "https://archlinux.org/packages/core/x86_64/linux/json/")
          UPSTREAM_VERSION=$(echo "$ARCH_JSON" | jq -r '.pkgver' + "." + ".pkgrel")
          
          echo "Found Upstream Arch Kernel: $UPSTREAM_VERSION"

          # 2. Get kernel version currently built in the repo
          BUILT_VERSION=$(gh release view --repo ${{ github.repository }} --json assets --jq '
            .assets[]?
            | select(.name | test("^zfs-linux-[0-9].*\\.pkg\\.tar\\.zst$")) 
            | .name 
            | capture("^zfs-linux-[^_]+_(?<kver>.*)-[^-]+-[^-]+\\.pkg").kver
            ' || true)

          echo "Existing Build found: $BUILT_VERSION"

          # 3. Is UPSTREAM_VERSION the BUILT_VERSION
          if echo "$BUILT_VERSION" | grep -Fxq "$UPSTREAM_VERSION"; then
            echo "Version $UPSTREAM_VERSION already exists. No build needed."
            echo "trigger=false" >> $GITHUB_OUTPUT
          else
            echo "New kernel detected ($UPSTREAM_VERSION). Triggering build..."
            echo "trigger=true" >> $GITHUB_OUTPUT
            echo "kernel_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Release Workflow
        if: steps.check.outputs.trigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          gh workflow run release.yml \
            --repo ${{ github.repository }} \
            --ref master \
            -f kernel_version="${{ steps.check.outputs.kernel_version }}"
          
