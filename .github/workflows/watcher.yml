name: Watch for Arch Kernel Updates

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/watcher.yml'
  schedule:
    - cron: '10 * * * *'  # Runs every hour at 10 past the hour.
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install nvchecker
        run: pip install nvchecker

      - name: Read Mirror URL
        id: get_mirror
        run: |
          MIRROR=$(cat mirror-url | tr -d '\n')
          echo "MIRROR_URL=$MIRROR" >> $GITHUB_ENV

      - name: Generate nvchecker config
        run: |
          sed "s|MIRROR_URL|$MIRROR_URL|g" nvchecker.toml.template > nvchecker.toml
          echo "Generated nvchecker.toml with mirror: $MIRROR"
          cat nvchecker.toml

      - name: Generate oldver.json from current GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view --repo ${{ github.repository }} --json assets --jq '.assets[].name' > assets.json
          
          # Extract versions and convert format: 6.12.70.1 into 6.12.70-1
          normalize_version() {
            echo "$1" | head -n1 | sed 's/\.\([0-9]*\)$/-\1/'
          }
          
          LTS_VER=$(grep 'zfs-linux-lts' assets.json | grep -oP '(?<=_)\d+\.\d+\.\d+\.\d+(?=-)' || echo '0.0.0-0')
          LINUX_VER=$(grep 'zfs-linux-' assets.json | grep -v 'lts\|hardened\|zen' | grep -oP '(?<=_)\d+\.\d+\.\d+\.\d+(?=-)' || echo '0.0.0-0')
          HARDENED_VER=$(grep 'zfs-linux-hardened' assets.json | grep -oP '(?<=_)\d+\.\d+\.\d+\.\d+(?=-)' || echo '0.0.0-0')
          ZEN_VER=$(grep 'zfs-linux-zen' assets.json | grep -oP '(?<=_)\d+\.\d+\.\d+\.\d+(?=-)' || echo '0.0.0-0')
          
          cat > oldver.json <<EOF
          {
            "linux-lts": "$(normalize_version "$LTS_VER")",
            "linux": "$(normalize_version "$LINUX_VER")",
            "linux-hardened": "$(normalize_version "$HARDENED_VER")",
            "linux-zen": "$(normalize_version "$ZEN_VER")"
          }
          EOF
          
          echo "Generated oldver.json:"
          cat oldver.json

      - name: Check for updates
        id: nvcheck
        run: |
          nvchecker -c nvchecker.toml
          nvcmp -c nvchecker.toml || echo "trigger=true" >> $GITHUB_OUTPUT
          cat newver.json

      - name: Trigger Release Workflow
        if: steps.compare.outputs.trigger == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Triggering release workflow..."
          gh workflow run release.yml \
            --repo ${{ github.repository }} \
            --ref master \
            f kernel_version="TEST"
            #-f kernel_version="${{ steps.compare.outputs.updates }}"
