name: Watch for Arch Kernel Updates

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/watcher.yml'
  schedule:
    - cron: '10 * * * *'  # Runs every hour at 10 past the hour.
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install nvchecker
        run: pip install nvchecker

      - name: Download core.db and extra.db from designated mirror
        id: get_mirror_db
        run: |
          MIRROR=$(cat mirror-url | tr -d '\n')
          curl -O $MIRROR/archlinux/core/os/x86_64/core.db
          curl -O $MIRROR/archlinux/extra/os/x86_64/extra.db

      - name: Generate oldver.json from current GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          touch assets.txt
          (gh release view --repo ${{ github.repository }} --json assets --jq '.assets[].name' | echo '') > assets.txt
          
          get_version() {
            grep "$1" assets.txt | head -n1 | sed -n 's/.*_\([^-]*\)-.*/\1/p' | sed 's/\.\([0-9]*\)$/-\1/'
          }

          LINUX_VER=$(get_version 'zfs-linux' || echo '0.0.0-0')
          LTS_VER=$(get_version 'zfs-linux-lts' || echo '0.0.0-0')
          HARDENED_VER=$(get_version 'zfs-linux-hardened' || echo '0.0.0-0')
          ZEN_VER=$(get_version 'zfs-linux-zen' || echo '0.0.0-0')

          cat > oldver.json <<EOF
          {
            "linux": "$LINUX_VER",
            "linux-lts": "$LTS_VER",
            "linux-hardened": "$HARDENED_VER",
            "linux-zen": "$ZEN_VER"
          }
          EOF

          echo "Generated oldver.json:"
          cat oldver.json

      - name: Check for updates
        id: nvcheck
        run: |
          nvchecker -c nvchecker.toml
          UPDATES=$(nvcmp -c nvchecker.toml | tr '\n' ' ')
          cat newver.json
          echo $UPDATES

          if [ -n "$UPDATES" ]; then
            echo "trigger=true" >> $GITHUB_OUTPUT
            echo "updates=$UPDATES" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Release Workflow
        if: steps.compare.outputs.trigger == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Triggering release workflow..."
          gh workflow run release.yml \
            --repo ${{ github.repository }} \
            --ref master \
            -f kernel_version="${{ steps.compare.outputs.updates }}"
